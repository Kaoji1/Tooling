<div class="login-page-container">

  <!-- Flow Field Particle Canvas Background -->
  <canvas #particleCanvas class="particle-canvas"></canvas>

  <!-- SVG Header -->
  <div class="svg-header-container">
    <svg viewBox="0 0 800 160" overflow="visible">

      <defs>
        <!-- Refined silver-indigo celestial gradient — subtle, not neon -->
        <linearGradient id="brandFill" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#eaf3ff" /> <!-- icy silver-white top -->
          <stop offset="25%" stop-color="#b8d0f0" /> <!-- soft steel blue -->
          <stop offset="60%" stop-color="#7090c8" /> <!-- deep indigo mid -->
          <stop offset="100%" stop-color="#a8c4e8" /> <!-- moonlit blue base -->
        </linearGradient>

        <!-- Refined glow: subtle depth, NOT aggressive neon.
             Dark navy drop-shadow provides contrast against starfield. -->
        <filter id="brandGlow" x="-12%" y="-55%" width="124%" height="210%">
          <!-- dark navy hard shadow for pop/contrast against starfield -->
          <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#010918" flood-opacity="0.80" />
          <!-- tight soft white inner glow -->
          <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#c8e4ff" flood-opacity="0.40" />
          <!-- wider indigo celestial halo -->
          <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#2a55a8" flood-opacity="0.28" />
        </filter>

        <!-- Clip path — Playfair Display, matching brand-text exactly -->
        <clipPath id="brandTextClip">
          <text x="50%" y="45%" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="82px"
            font-weight="900" font-style="italic">
            MinebeaMitsumi
          </text>
        </clipPath>

        <!-- Shimmer gradient: narrow diagonal white glint -->
        <linearGradient id="shimmerGradCSS" x1="0%" y1="0%" x2="100%" y2="40%">
          <stop offset="0%" stop-color="rgba(255,255,255,0)" />
          <stop offset="44%" stop-color="rgba(255,255,255,0)" />
          <stop offset="50%" stop-color="rgba(255,255,255,0.45)" />
          <stop offset="56%" stop-color="rgba(255,255,255,0)" />
          <stop offset="100%" stop-color="rgba(255,255,255,0)" />
        </linearGradient>
      </defs>

      <!-- Brand Name — Playfair Display heavy serif italic -->
      <text x="50%" y="45%" text-anchor="middle" class="brand-text">
        <tspan *ngFor="let char of brandChars" class="hover-char">{{char}}</tspan>
      </text>

      <!-- Shimmer sweep (clipped to letterforms, intermittent) -->
      <rect class="brand-shimmer" x="-100%" y="0" width="40%" height="100%" clip-path="url(#brandTextClip)" />

      <!-- Subtitle -->
      <text x="50%" y="75%" text-anchor="middle" class="sub-text">
        <tspan *ngFor="let char of subtitleChars" class="hover-char-sub">{{char}}</tspan>
      </text>
    </svg>
  </div>

  <!-- Login Card -->
  <div class="login-card-entrance">

    <div style="margin-bottom: 2rem; text-align: center;">
      <h2 style="font-size: 1.75rem; font-weight: 800; color: #1e293b; margin-bottom: 0.5rem;">Welcome Back</h2>
      <p style="color: #64748b; font-size: 0.95rem;">Please sign in to continue</p>
    </div>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm">
      <!-- Username -->
      <div class="input-group">
        <label for="username">Username</label>
        <div style="position: relative;">
          <span class="icon-wrapper">
            <i class="bi bi-person"></i>
          </span>
          <input type="text" id="username" name="username" [(ngModel)]="Username" required autocomplete="username"
            placeholder="Enter your ID">
        </div>
      </div>

      <!-- Password -->
      <div class="input-group password-group">
        <label for="password">Password</label>
        <div style="position: relative; display: flex; align-items: center; gap: 10px;">
          <div style="position: relative; width: 100%;">
            <span class="icon-wrapper">
              <i class="bi bi-lock"></i>
            </span>
            <input [type]="showPassword ? 'text' : 'password'" id="password" name="password" [(ngModel)]="Password"
              required autocomplete="current-password" placeholder="Enter password" class="password-input">
          </div>

          <button type="button" (click)="togglePasswordVisibility()" class="toggle-password-btn-outside"
            style="color: #94a3b8; background: none; border: none; cursor: pointer; font-size: 1.25rem; transition: color 0.2s;"
            onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='#94a3b8'">
            <i class="bi" [ngClass]="showPassword ? 'bi-eye' : 'bi-eye-slash'"></i>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="submit-btn">
        SIGN IN
        <i class="bi bi-arrow-right"></i>
      </button>

      <p *ngIf="errorMessage"
        style="color: #ef4444; font-size: 0.875rem; text-align: center; margin-top: 1rem; background-color: #fef2f2; padding: 0.5rem; border-radius: 0.5rem; border: 1px solid #fee2e2;">
        {{ errorMessage }}
      </p>
    </form>
  </div>

  <!-- Decoration / Footer -->
  <div class="footer-text">
    &copy; MinebeaMitsumi - Smart Tooling System
  </div>
</div>
