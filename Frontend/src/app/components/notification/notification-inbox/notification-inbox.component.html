<!-- Backdrop -->
<div *ngIf="isOpen" class="inbox-backdrop" (click)="closeModal()">

    <!-- Container -->
    <div class="inbox-container" (click)="stopPropagation($event)">

        <!-- Header Section -->
        <div class="inbox-header">
            <div class="header-left">
                <h2 class="header-title">Notifications</h2>
                <span class="unread-badge" *ngIf="(unreadCount$ | async) as count">
                    {{ count }} Unread
                </span>
            </div>

            <button (click)="closeModal()" class="close-btn" title="Close">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Toolbar / Filters -->
        <div class="inbox-toolbar">
            <div class="filter-group">
                <button [class]="filter === 'all' ? 'filter-btn active' : 'filter-btn inactive'"
                    (click)="setFilter('all')">
                    All
                </button>
                <button [class]="filter === 'unread' ? 'filter-btn active' : 'filter-btn inactive'"
                    (click)="setFilter('unread')">
                    Unread
                </button>
                <button [class]="filter === 'priority' ? 'filter-btn active' : 'filter-btn inactive'"
                    (click)="setFilter('priority')">
                    High Priority
                </button>
            </div>

            <button (click)="markAllAsRead()" class="mark-all-btn">
                Mark all as read
            </button>
        </div>

        <!-- List Body -->
        <div class="inbox-list-body">
            <ul class="notification-list" *ngIf="(filteredNotifications$ | async)?.length; else emptyState">
                <li *ngFor="let item of filteredNotifications$ | async" class="notification-row"
                    [ngClass]="item.IsRead ? 'read' : 'unread'" (click)="markAsRead(item.Notification_ID)">

                    <!-- Left: Icon -->
                    <div class="icon-container">
                        <div class="icon-circle">
                            <ng-container [ngSwitch]="item.Event_Type">
                                <!-- Plan Revision Icon (Orange Pencil) -->
                                <svg *ngSwitchCase="'PLAN_REVISION'" xmlns="http://www.w3.org/2000/svg" width="20"
                                    height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" class="text-amber-500">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>

                                <!-- Plan Cancelled Icon (Red Ban) -->
                                <svg *ngSwitchCase="'CANCEL_PLAN'" xmlns="http://www.w3.org/2000/svg" width="20"
                                    height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" class="text-red-500">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line>
                                </svg>

                                <!-- Document Attached Icon (File) -->
                                <svg *ngSwitchCase="'UPDATE_PLAN'" xmlns="http://www.w3.org/2000/svg" width="20"
                                    height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                                    <polyline points="13 2 13 9 20 9"></polyline>
                                </svg>

                                <!-- New Plan Icon (Green Plus Circle) -->
                                <svg *ngSwitchCase="'NEW_PLAN'" xmlns="http://www.w3.org/2000/svg" width="20"
                                    height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" class="text-green-600">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="8" x2="12" y2="16"></line>
                                    <line x1="8" y1="12" x2="16" y2="12"></line>
                                </svg>

                                <!-- Info/Default Icon -->
                                <svg *ngSwitchDefault xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg>
                            </ng-container>
                        </div>
                    </div>

                    <!-- Middle: Content (The Anatomy) -->
                    <div class="row-content">
                        <div class="row-subject">
                            <h3>
                                <!-- Dynamic Headers based on type -->
                                <ng-container [ngSwitch]="item.Event_Type">
                                    <span *ngSwitchCase="'PLAN_REVISION'">Plan Revision Update</span>
                                    <span *ngSwitchCase="'CANCEL_PLAN'">Plan Cancelled</span>
                                    <span *ngSwitchCase="'UPDATE_PLAN'">Document Attached</span>
                                    <span *ngSwitchCase="'NEW_PLAN'">New Plan Request</span>
                                    <span *ngSwitchDefault>{{ item.Event_Type | titlecase }}</span>
                                </ng-container>
                            </h3>
                        </div>
                        <!-- Rich HTML Message Content -->
                        <p class="row-preview" [innerHTML]="item.Message"></p>
                    </div>

                    <!-- Right: Timestamp & Actions -->
                    <div class="row-right">
                        <span class="timestamp">
                            {{ item.Created_At | date:'shortTime' }}
                        </span>

                        <!-- Hidden Action Buttons (Show on Hover) -->
                        <div class="row-actions">
                            <button *ngIf="!item.IsRead"
                                (click)="markAsRead(item.Notification_ID); $event.stopPropagation()" class="action-btn"
                                title="Mark as read">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none"
                                    viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M5 13l4 4L19 7" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </li>
            </ul>

            <!-- Empty State -->
            <ng-template #emptyState>
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" class="empty-icon" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                    </svg>
                    <p class="empty-title">Your inbox is empty</p>
                    <p class="empty-desc">No notifications found for the current filter.</p>
                </div>
            </ng-template>
        </div>
    </div>
</div>
