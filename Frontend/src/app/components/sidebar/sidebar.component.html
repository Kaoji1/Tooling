<nav class="sidebar">
  <div class="top">

    <ul class="nav-links">
      <li routerLinkActive="active" *ngIf="role === 'PC' || role === 'view' || role === 'admin'">
        <a routerLink="/production/PCPlan">
          <i class="bi bi-clipboard-data"></i>
          <span class="link-text">PC Plan</span>
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/production/PlanList">
          <i class="bi bi-list-check"></i>
          <span class="link-text">Plan List</span>
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/production/request">
          <i class="bi bi-newspaper"></i>
          <span class="link-text">Request</span>
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/production/cart">
          <i class="bi bi-cart"></i>
          <span class="link-text">Cart</span>
          <span class="cart-count" *ngIf="cartCount > 0">{{ cartCount }}</span>
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/production/return">
          <i class="bi bi-arrow-counterclockwise"></i>
          <span class="link-text">Return</span>
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/production/history">
          <i class="bi bi-clock-history"></i>
          <span class="link-text">History</span>
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/production/return-history">
          <i class="bi bi-clock-history"></i>
          <span class="link-text">Return History</span>
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/production/historyprint">
          <i class="bi bi-printer-fill"></i>
          <span class="link-text">History Print</span>
        </a>
      </li>
    </ul>
  </div>

  <div class="sidebar-footer">
    <div class="user-profile-card">
      <div class="avatar-container">
        <div class="avatar-circle">
          {{ Employee_Name ? Employee_Name.charAt(0).toUpperCase() : 'U' }}
        </div>
      </div>
      <div class="user-info">
        <span class="user-name" title="{{ Employee_Name }}">{{ Employee_Name }}</span>
        <span class="user-role">{{ role || 'User' }}</span>
      </div>
    </div>

    <button (click)="logout()" class="btn-logout-premium">
      <div class="icon-wrapper">
        <i class="bi bi-box-arrow-right"></i>
      </div>
      <span class="logout-text">Sign Out</span>
    </button>
  </div>
</nav>
