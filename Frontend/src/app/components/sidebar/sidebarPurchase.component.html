<nav class="sidebar">
  <div class="top">

    <ul class="nav-links">
      <li routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <a routerLink="/purchase/detail">
          <i class="bi bi-newspaper"></i>
          <span class="link-text">Request List</span>
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/purchase/detailcasesetup">
          <i class="bi bi-tools"></i>
          <span class="link-text">Case SETUP</span>
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/purchase/requestlist">
          <i class="bi bi-card-checklist"></i>
          <span class="link-text">Total Item</span>
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/purchase/returnlist">
          <i class="bi bi-arrow-return-left"></i>
          <span class="link-text">Return List</span>
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/purchase/history-request">
          <i class="bi bi-clock-history"></i>
          <span class="link-text">History</span>
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/purchase/analyze">
          <i class="bi bi-clipboard-data"></i>
          <span class="link-text">Dashboard</span>
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/purchase/master-ph">
          <i class="bi bi-database"></i>
          <span class="link-text">Master PH</span>
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/purchase/add-user">
          <i class="bi bi-person-fill-add"></i>
          <span class="link-text">Add User</span>
        </a>
      </li>
    </ul>
  </div>

  <div class="sidebar-footer">
    <div class="user-profile-card">
      <div class="avatar-container">
        <div class="avatar-circle">
          {{ Employee_Name ? Employee_Name.charAt(0).toUpperCase() : 'U' }}
        </div>
      </div>
      <div class="user-info">
        <span class="user-name" title="{{ Employee_Name }}">{{ Employee_Name }}</span>
        <span class="user-role">PURCHASE</span>
      </div>
    </div>

    <button (click)="logout()" class="btn-logout-premium">
      <div class="icon-wrapper">
        <i class="bi bi-box-arrow-right"></i>
      </div>
      <span class="logout-text">Sign Out</span>
    </button>
  </div>
</nav>
